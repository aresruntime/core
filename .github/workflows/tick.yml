name: tick

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: install
        run: |
          pip install -e .
          playwright install chromium

      - name: tick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ARES_SOL_KEYPAIR: ${{ secrets.ARES_SOL_KEYPAIR }}
        run: ares run --once

      - name: persist memory
        run: |
          git config user.name "ares-runtime"
          git config user.email "ares@users.noreply.github.com"
          git add data/memory/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "memory: tick persisted"
          git push || true
